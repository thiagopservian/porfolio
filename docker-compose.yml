services:
  portfolio:
    build: .
    container_name: portfolio
    ports:
      - "5173:5173"
    volumes:
      # Montar el código para hot-reload en vivo
      - .:/app
      # Mantener node_modules del contenedor (no pisarlo con el host)
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
